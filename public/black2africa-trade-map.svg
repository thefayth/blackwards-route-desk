<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Black2Africa trade-route atlas</title>
  <desc id="desc">An abstract trade-route atlas connecting diaspora and African market nodes through reviewed partnership paths.</desc>
  <defs>
    <linearGradient id="mapField" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020403"/>
      <stop offset=".6" stop-color="#06130f"/>
      <stop offset="1" stop-color="#123228"/>
    </linearGradient>
    <pattern id="mapGrid" width="45" height="45" patternUnits="userSpaceOnUse">
      <path d="M45 0H0v45" fill="none" stroke="#fff7e8" stroke-opacity=".07"/>
    </pattern>
    <filter id="mapGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="900" height="520" rx="26" fill="url(#mapField)"/>
  <rect width="900" height="520" rx="26" fill="url(#mapGrid)"/>
